<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Scheduler</title>
    
    <!-- Backend URL Configuration -->
    <script>
        // This will be replaced by envsubst in the Docker container
        window.BACKEND_URL = '${BACKEND_URL}';
    </script>
    
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-logo">
                    <img src="images/emea-travels-new.png" alt="EMEA Travels" class="logo">
                </div>
                <div class="header-text">
                    <h1>📅 Meeting Scheduler</h1>
                    <p class="subtitle">Schedule and manage customer meetings</p>
                </div>
            </div>
        </header>

        <main>
            <!-- Action buttons and filters -->
            <div class="actions">
                <button id="newMeetingBtn" class="btn btn-primary">+ New Meeting</button>
                <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
                <div class="filter-group">
                    <label for="participantFilter">Filter by Participant:</label>
                    <select id="participantFilter" class="participant-filter">
                        <option value="">All Participants</option>
                        <option value="Ricardo">Ricardo</option>
                        <option value="Jukka">Jukka</option>
                        <option value="Máté">Máté</option>
                        <option value="Steve">Steve</option>
                    </select>
                </div>
            </div>

            <!-- Calendar view -->
            <div id="calendar"></div>

            <!-- Meeting list -->
            <div class="meeting-list">
                <h2>Upcoming Meetings</h2>
                <div id="meetingsList"></div>
            </div>
        </main>
    </div>

    <!-- Meeting Modal -->
    <div id="meetingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">New Meeting</h2>
            
            <form id="meetingForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="customer">Customer</label>
                    <input type="text" id="customer" name="customer">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_date">Start Date *</label>
                        <input type="date" id="start_date" name="start_date" required>
                    </div>

                    <div class="form-group">
                        <label for="end_date">End Date *</label>
                        <input type="date" id="end_date" name="end_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location">
                </div>

                <div class="form-group">
                    <label>Participants *</label>
                    <div class="participants-group">
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Ricardo">
                            Ricardo
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Jukka">
                            Jukka
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Máté">
                            Máté
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Steve">
                            Steve
                        </label>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="is_onsite" name="is_onsite">
                        On-site Meeting
                    </label>
                </div>

                <div class="form-group" id="countryGroup" style="display: none;">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" placeholder="e.g., Finland, Sweden, USA">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Meeting</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script src="js/meetings.js"></script>
    <script src="js/calendar.js"></script>
    
    <!-- watsonx Orchestrate Webchat with Event Handlers and Custom Styling -->
    <script>
        // Function to refresh the UI
        function refreshMeetingsUI() {
            console.log('🔄 Refreshing meetings UI...');
            
            // Try multiple methods to refresh the UI
            if (typeof window.loadMeetings === 'function') {
                window.loadMeetings();
                console.log('✓ window.loadMeetings() called');
            } else if (typeof loadMeetings === 'function') {
                loadMeetings();
                console.log('✓ loadMeetings() called');
            } else if (window.app && typeof window.app.loadMeetings === 'function') {
                window.app.loadMeetings();
                console.log('✓ window.app.loadMeetings() called');
            } else {
                // Fallback: trigger refresh button click
                const refreshBtn = document.getElementById('refreshBtn');
                if (refreshBtn) {
                    refreshBtn.click();
                    console.log('✓ Refresh button clicked (fallback)');
                } else {
                    console.error('❌ No refresh method available!');
                }
            }
        }
        
        // Make it globally accessible for testing
        window.refreshMeetingsUI = refreshMeetingsUI;
        
        // Event handler for when webchat loads
        function onChatLoad(instance) {
            console.log('✅ Webchat loaded, instance:', instance);
            
            // Register receive event handler
            instance.on('receive', function(event, instance) {
                console.log('📨 Agent response received:', event);
                
                // Extract text from the message
                let text = '';
                
                if (event.message?.content) {
                    // Extract text from content array
                    text = event.message.content
                        .map(item => item.text || '')
                        .join(' ');
                } else if (event.message?.text) {
                    text = event.message.text;
                } else if (event.text) {
                    text = event.text;
                }
                
                console.log('📝 Extracted text:', text);
                
                // Check for meeting action keywords
                const actionKeywords = [
                    'created', 'updated', 'deleted', 'scheduled', 'removed',
                    'added', 'cancelled', 'modified', 'saved', 'booked',
                    'meeting has been', 'successfully', 'confirmed'
                ];
                
                const hasAction = actionKeywords.some(keyword =>
                    text.toLowerCase().includes(keyword.toLowerCase())
                );
                
                if (hasAction) {
                    console.log('🔄 Meeting action detected! Refreshing UI in 2 seconds...');
                    setTimeout(refreshMeetingsUI, 2000);
                } else {
                    console.log('ℹ️ No meeting action detected in response');
                }
            });
            
            console.log('✅ Event listener registered successfully');
        }
        
        window.wxOConfiguration = {
            orchestrationID: "20250430-1552-4383-00f2-8e9318aa2f1b_20250502-1858-1349-5018-58d645b23686",
            hostURL: "https://eu-central-1.dl.watson-orchestrate.ibm.com",
            rootElementID: "root",
            showLauncher: true,
            chatOptions: {
                agentId: "dce5fd47-18cb-4eed-afd7-4c127294cec3",
                onLoad: onChatLoad
            },
            
            // Custom styling to match EMEA Travels branding
            style: {
                headerColor: '#4A5FFF',
                userMessageBackgroundColor: '#4A5FFF',
                primaryColor: '#4A5FFF',
                showBackgroundGradient: true
            },
            
            // Header configuration
            header: {
                showResetButton: true,
                showAiDisclaimer: true
            }
        };

        // Load webchat script
        setTimeout(function () {
            const script = document.createElement('script');
            script.src = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
            script.addEventListener('load', function () {
                console.log('✅ Webchat loader script loaded');
                
                // Wait a bit for wxoLoader to be available
                setTimeout(function() {
                    if (typeof wxoLoader !== 'undefined') {
                        console.log('✅ wxoLoader is available, initializing...');
                        
                        // Listen for the webchat ready event using DOM events
                        window.addEventListener('message', function(event) {
                            // Check if this is a message from the webchat
                            if (event.data && event.data.type) {
                                console.log('📨 Received message:', event.data.type, event.data);
                                
                                // Look for agent response messages
                                if (event.data.type === 'receive' ||
                                    event.data.type === 'agent:message' ||
                                    event.data.type === 'message:received') {
                                    
                                    // Extract text from the message
                                    let text = '';
                                    if (event.data.message) {
                                        text = typeof event.data.message === 'string'
                                            ? event.data.message
                                            : JSON.stringify(event.data.message);
                                    } else if (event.data.text) {
                                        text = event.data.text;
                                    } else if (event.data.data) {
                                        text = JSON.stringify(event.data.data);
                                    }
                                    
                                    console.log('� Message text:', text);
                                    
                                    // Check for meeting action keywords
                                    const actionKeywords = [
                                        'created', 'updated', 'deleted', 'scheduled', 'removed',
                                        'added', 'cancelled', 'modified', 'saved', 'booked',
                                        'meeting has been', 'successfully', 'confirmed'
                                    ];
                                    
                                    const hasAction = actionKeywords.some(keyword =>
                                        text.toLowerCase().includes(keyword.toLowerCase())
                                    );
                                    
                                    if (hasAction) {
                                        console.log('🔄 Meeting action detected! Refreshing UI in 2 seconds...');
                                        setTimeout(refreshMeetingsUI, 2000);
                                    }
                                }
                            }
                        });
                        
                        console.log('✅ Message event listener registered');
                        
                        // Initialize the webchat
                        wxoLoader.init();
                        console.log('✅ Webchat initialized');
                        
                    } else {
                        console.error('❌ wxoLoader not available after script load');
                    }
                }, 100);
            });
            document.head.appendChild(script);
        }, 0);
    </script>
</body>
</html>

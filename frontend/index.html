<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Scheduler</title>
    
    <!-- Backend URL Configuration -->
    <script>
        // This will be replaced by envsubst in the Docker container
        window.BACKEND_URL = '${BACKEND_URL}';
    </script>
    
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-logo">
                    <img src="images/emea-travels-new.png" alt="EMEA Travels" class="logo">
                </div>
                <div class="header-text">
                    <h1>📅 Meeting Scheduler</h1>
                    <p class="subtitle">Schedule and manage customer meetings</p>
                </div>
            </div>
        </header>

        <main>
            <!-- Action buttons and filters -->
            <div class="actions">
                <button id="newMeetingBtn" class="btn btn-primary">+ New Meeting</button>
                <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
                <div class="filter-group">
                    <label for="participantFilter">Filter by Participant:</label>
                    <select id="participantFilter" class="participant-filter">
                        <option value="">All Participants</option>
                        <option value="Ricardo">Ricardo</option>
                        <option value="Jukka">Jukka</option>
                        <option value="Máté">Máté</option>
                        <option value="Steve">Steve</option>
                    </select>
                </div>
            </div>

            <!-- Calendar view -->
            <div id="calendar"></div>

            <!-- Meeting list -->
            <div class="meeting-list">
                <h2>Upcoming Meetings</h2>
                <div id="meetingsList"></div>
            </div>
        </main>
    </div>

    <!-- Meeting Modal -->
    <div id="meetingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">New Meeting</h2>
            
            <form id="meetingForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="customer">Customer</label>
                    <input type="text" id="customer" name="customer">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_date">Start Date *</label>
                        <input type="date" id="start_date" name="start_date" required>
                    </div>

                    <div class="form-group">
                        <label for="end_date">End Date *</label>
                        <input type="date" id="end_date" name="end_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location">
                </div>

                <div class="form-group">
                    <label>Participants *</label>
                    <div class="participants-group">
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Ricardo">
                            Ricardo
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Jukka">
                            Jukka
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Máté">
                            Máté
                        </label>
                        <label class="participant-checkbox">
                            <input type="checkbox" name="participant" value="Steve">
                            Steve
                        </label>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="is_onsite" name="is_onsite">
                        On-site Meeting
                    </label>
                </div>

                <div class="form-group" id="countryGroup" style="display: none;">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" placeholder="e.g., Finland, Sweden, USA">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Meeting</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script src="js/meetings.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
